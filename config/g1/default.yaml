# G1 Robot Training Configuration for Transformer+GCN Policy
# Run: python legged_gym/scripts/train_g1_custom.py --cfg config/g1/default.yaml

seed: 42

env:
  num_envs: 4096
  # Graph encoding mode: 'none' (disabled), 'onehot', or 'topological'
  graph_mode: topological

model:
  # Observation / action dimensions – overridden automatically at runtime
  obs_dim: 47
  act_dim: 12
  # Number of limbs = graph nodes – overridden from URDF at runtime
  num_limbs: 13

  # Graph encoding mode (must match env.graph_mode)
  graph_mode: topological

  # GCN settings
  gcn_hidden_dims: [64]
  gcn_output_dim: 32
  # Input node feature dim – overridden from graph parser at runtime
  # topological mode produces 3 features (degree, norm_degree, norm_depth)
  node_feature_dim: 3

  # Transformer settings
  d_model: 128
  num_heads: 4
  num_layers: 2
  dim_feedforward: 256
  dropout: 0.0

ppo:
  lr: 3.0e-4
  clip_ratio: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 1.0
  num_epochs: 5
  batch_size: 4096
  num_steps: 24
  gamma: 0.99
  lam: 0.95

training:
  max_iterations: 10000
  save_interval: 500
  log_interval: 50
